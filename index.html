<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hiragana Land</title>
  
  <!-- Tailwind CSS（デザインを整えるツール）の読み込み -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Reactをブラウザで動かすための翻訳ツール（Babel）の読み込み -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Reactやアイコンをインターネットから取得するための設定 -->
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.344.0?deps=react@18.2.0"
      }
    }
  </script>
</head>
<body>
  <!-- アプリが表示される場所 -->
  <div id="root"></div>

  <!-- ここから下が変換したReactのコードです -->
  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useCallback } from 'react';
    import { createRoot } from 'react-dom/client';
    import { Play, Home, Volume2, Award, Star, ArrowLeft, Check, X, Download } from 'lucide-react';

    // ひらがなデータ（空白はグリッドのレイアウト調整用）
    const HIRAGANA_DATA = [
      { kana: 'あ', romaji: 'a' }, { kana: 'い', romaji: 'i' }, { kana: 'う', romaji: 'u' }, { kana: 'え', romaji: 'e' }, { kana: 'お', romaji: 'o' },
      { kana: 'か', romaji: 'ka' }, { kana: 'き', romaji: 'ki' }, { kana: 'く', romaji: 'ku' }, { kana: 'け', romaji: 'ke' }, { kana: 'こ', romaji: 'ko' },
      { kana: 'さ', romaji: 'sa' }, { kana: 'し', romaji: 'shi' }, { kana: 'す', romaji: 'su' }, { kana: 'せ', romaji: 'se' }, { kana: 'そ', romaji: 'so' },
      { kana: 'た', romaji: 'ta' }, { kana: 'ち', romaji: 'chi' }, { kana: 'つ', romaji: 'tsu' }, { kana: 'て', romaji: 'te' }, { kana: 'と', romaji: 'to' },
      { kana: 'な', romaji: 'na' }, { kana: 'に', romaji: 'ni' }, { kana: 'ぬ', romaji: 'nu' }, { kana: 'ね', romaji: 'ne' }, { kana: 'の', romaji: 'no' },
      { kana: 'は', romaji: 'ha' }, { kana: 'ひ', romaji: 'hi' }, { kana: 'ふ', romaji: 'fu' }, { kana: 'へ', romaji: 'he' }, { kana: 'ほ', romaji: 'ho' },
      { kana: 'ま', romaji: 'ma' }, { kana: 'み', romaji: 'mi' }, { kana: 'む', romaji: 'mu' }, { kana: 'め', romaji: 'me' }, { kana: 'も', romaji: 'mo' },
      { kana: 'や', romaji: 'ya' }, { kana: '', romaji: '' }, { kana: 'ゆ', romaji: 'yu' }, { kana: '', romaji: '' }, { kana: 'よ', romaji: 'yo' },
      { kana: 'ら', romaji: 'ra' }, { kana: 'り', romaji: 'ri' }, { kana: 'る', romaji: 'ru' }, { kana: 'れ', romaji: 're' }, { kana: 'ろ', romaji: 'ro' },
      { kana: 'わ', romaji: 'wa' }, { kana: '', romaji: '' }, { kana: '', romaji: '' }, { kana: '', romaji: '' }, { kana: 'を', romaji: 'wo' },
      { kana: 'ん', romaji: 'n' }, { kana: '', romaji: '' }, { kana: '', romaji: '' }, { kana: '', romaji: '' }, { kana: '', romaji: '' }
    ];

    const VALID_KANA = HIRAGANA_DATA.filter(item => item.kana !== '');

    // 配列をシャッフルするユーティリティ関数
    const shuffleArray = (array) => {
      const newArr = [...array];
      for (let i = newArr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [newArr[i], newArr[j]] = [newArr[j], newArr[i]];
      }
      return newArr;
    };

    function App() {
      const [currentView, setCurrentView] = useState('home'); // 'home', 'table', 'quiz', 'certificate'
      const [score, setScore] = useState(0);
      const [userName, setUserName] = useState('');
      
      // クイズ用の状態
      const [currentQuestion, setCurrentQuestion] = useState(null);
      const [options, setOptions] = useState([]);
      const [feedback, setFeedback] = useState(null); // 'correct', 'incorrect', null

      // 音声リストをあらかじめ読み込んでおく（Chrome等の非同期読み込み対策）
      useEffect(() => {
        if ('speechSynthesis' in window) {
          window.speechSynthesis.getVoices();
          window.speechSynthesis.onvoiceschanged = () => {
            window.speechSynthesis.getVoices();
          };
        }
      }, []);

      // Web Speech API を使った音声読み上げ
      const playSound = useCallback((text) => {
        if ('speechSynthesis' in window) {
          // 再生中の音声をキャンセル
          window.speechSynthesis.cancel();
          const msg = new SpeechSynthesisUtterance(text);
          msg.lang = 'ja-JP';
          msg.rate = 0.8; // 少しゆっくり発音

          // 利用可能な音声リストを取得
          const voices = window.speechSynthesis.getVoices();
          
          // Googleの日本語音声（高音質）を優先して探す
          const googleJaVoice = voices.find(v => v.lang.includes('ja') && v.name.toLowerCase().includes('google'));
          // なければその他の日本語音声を探す
          const anyJaVoice = voices.find(v => v.lang.includes('ja'));

          if (googleJaVoice) {
            msg.voice = googleJaVoice;
          } else if (anyJaVoice) {
            msg.voice = anyJaVoice;
          }

          window.speechSynthesis.speak(msg);
        }
      }, []);

      // 新しいクイズを生成する
      const generateQuiz = useCallback(() => {
        // 正解をランダムに選ぶ
        const correctAnswer = VALID_KANA[Math.floor(Math.random() * VALID_KANA.length)];
        
        // 不正解の選択肢を3つ選ぶ
        let wrongAnswers = [];
        while (wrongAnswers.length < 3) {
          const randomKana = VALID_KANA[Math.floor(Math.random() * VALID_KANA.length)];
          if (randomKana.kana !== correctAnswer.kana && !wrongAnswers.some(w => w.kana === randomKana.kana)) {
            wrongAnswers.push(randomKana);
          }
        }

        const allOptions = shuffleArray([correctAnswer, ...wrongAnswers]);
        setCurrentQuestion(correctAnswer);
        setOptions(allOptions);
        setFeedback(null);
        
        // クイズ生成時に音声を鳴らす
        playSound(correctAnswer.kana);
      }, [playSound]);

      // クイズ開始
      const startQuiz = () => {
        setScore(0);
        setCurrentView('quiz');
        generateQuiz();
      };

      // 回答を選択した時の処理
      const handleAnswer = (selectedKana) => {
        if (feedback !== null) return; // 既に回答済みの場合は無視

        if (selectedKana.kana === currentQuestion.kana) {
          setFeedback('correct');
          const newScore = score + 10;
          setScore(newScore);
          playSound('せいかい');

          // 100点に到達したら修了証画面へ遷移
          if (newScore >= 100) {
            setTimeout(() => {
              setCurrentView('certificate');
            }, 1500);
            return; // 次のクイズは生成しない
          }
        } else {
          setFeedback('incorrect');
          // 不正解の場合は10点マイナス（ただし0点未満にはならないようにする）
          setScore(s => Math.max(0, s - 10));
          playSound('ざんねん');
        }

        // 1.5秒後に次の問題へ
        setTimeout(() => {
          generateQuiz();
        }, 1500);
      };

      // 修了証を画像としてダウンロードする処理
      const downloadCertificate = () => {
        const canvas = document.createElement('canvas');
        canvas.width = 800;
        canvas.height = 600;
        const ctx = canvas.getContext('2d');

        // 背景を塗る
        ctx.fillStyle = '#fdf2f8'; // ピンクの薄い背景
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // 枠線を描く
        ctx.strokeStyle = '#fbcfe8';
        ctx.lineWidth = 20;
        ctx.strokeRect(10, 10, canvas.width - 20, canvas.height - 20);
        ctx.strokeStyle = '#f472b6';
        ctx.lineWidth = 4;
        ctx.strokeRect(30, 30, canvas.width - 60, canvas.height - 60);

        // テキストを描く
        ctx.fillStyle = '#db2777'; // 濃いピンク
        ctx.font = 'bold 50px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('Certificate of Achievement', canvas.width / 2, 120);

        ctx.fillStyle = '#374151'; // ダークグレー
        ctx.font = '30px sans-serif';
        ctx.fillText('This certifies that', canvas.width / 2, 220);

        // ユーザー名
        ctx.fillStyle = '#2563eb'; // 青
        ctx.font = 'bold 60px sans-serif';
        ctx.fillText(userName || 'Student', canvas.width / 2, 310);

        ctx.fillStyle = '#374151';
        ctx.font = '30px sans-serif';
        ctx.fillText('has successfully mastered the Hiragana Quiz', canvas.width / 2, 400);
        ctx.fillText('with a perfect score of 100 points!', canvas.width / 2, 450);

        // 日付
        const date = new Date().toLocaleDateString();
        ctx.fillStyle = '#6b7280'; // グレー
        ctx.font = '24px sans-serif';
        ctx.fillText(`Date: ${date}`, canvas.width / 2, 540);

        // ダウンロードの実行
        const url = canvas.toDataURL('image/png');
        const a = document.createElement('a');
        a.href = url;
        a.download = `${userName || 'Student'}_Hiragana_Certificate.png`;
        a.click();
      };

      // --- コンポーネント: ホーム画面 ---
      const renderHomeView = () => (
        <div className="flex flex-col items-center justify-center h-full space-y-8 p-6 text-center animate-in fade-in zoom-in duration-500">
          <div className="bg-white/80 p-8 rounded-3xl shadow-xl backdrop-blur-sm border-4 border-yellow-300 w-full max-w-md">
            <h1 className="text-4xl md:text-5xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-orange-400 to-pink-500 mb-4 tracking-wider">
              Hiragana<br/>Land
            </h1>
            <p className="text-gray-600 font-medium mb-8">Master Hiragana while having fun!</p>
            
            <div className="flex flex-col gap-4 w-full mx-auto">
              <input 
                type="text" 
                placeholder="Enter your name" 
                value={userName}
                onChange={(e) => setUserName(e.target.value)}
                className="w-full text-center text-xl p-4 border-2 border-pink-200 rounded-2xl focus:outline-none focus:border-pink-500 transition shadow-inner mb-2"
              />

              <button 
                onClick={() => setCurrentView('table')}
                className="flex items-center justify-center gap-3 bg-blue-400 hover:bg-blue-500 text-white text-xl font-bold py-4 px-6 rounded-2xl shadow-lg transform transition active:scale-95"
              >
                <Home size={28} />
                Hiragana Chart
              </button>
              <button 
                onClick={startQuiz}
                disabled={!userName.trim()}
                className={`flex items-center justify-center gap-3 text-white text-xl font-bold py-4 px-6 rounded-2xl shadow-lg transform transition ${!userName.trim() ? 'bg-gray-300 cursor-not-allowed' : 'bg-pink-400 hover:bg-pink-500 active:scale-95'}`}
              >
                <Play size={28} />
                Play Quiz
              </button>
            </div>
          </div>
        </div>
      );

      // --- コンポーネント: ひらがな表画面 ---
      const renderTableView = () => (
        <div className="flex flex-col h-full bg-white/90 rounded-3xl shadow-xl p-4 md:p-8 animate-in slide-in-from-right duration-300">
          <div className="flex items-center justify-between mb-6">
            <button 
              onClick={() => setCurrentView('home')}
              className="flex items-center gap-2 text-gray-500 hover:text-gray-800 transition font-bold bg-gray-100 py-2 px-4 rounded-full"
            >
              <ArrowLeft size={20} /> Back
            </button>
            <h2 className="text-2xl md:text-3xl font-bold text-blue-600">Hiragana Chart</h2>
            <div className="w-24"></div>
          </div>

          <div className="flex-1 overflow-y-auto pb-4">
            <div className="grid grid-cols-5 gap-2 md:gap-4 max-w-2xl mx-auto">
              {HIRAGANA_DATA.map((item, index) => (
                <div key={index} className="aspect-square">
                  {item.kana ? (
                    <button
                      onClick={() => playSound(item.kana)}
                      className="w-full h-full flex flex-col items-center justify-center bg-white border-2 border-blue-200 rounded-xl md:rounded-2xl shadow-sm hover:shadow-md hover:border-blue-400 hover:-translate-y-1 transition group"
                    >
                      <span className="text-3xl md:text-5xl font-bold text-gray-800 group-active:text-blue-500 transition-colors kyokasho-font">
                        {item.kana}
                      </span>
                      <span className="text-xs md:text-sm text-gray-400 mt-1 font-medium">
                        {item.romaji}
                      </span>
                    </button>
                  ) : (
                    <div className="w-full h-full"></div>
                  )}
                </div>
              ))}
            </div>
          </div>
        </div>
      );

      // --- コンポーネント: クイズ画面 ---
      const renderQuizView = () => (
        <div className="flex flex-col items-center justify-center p-2 md:p-4 animate-in zoom-in duration-300 w-full">
          <div className="w-full max-w-lg bg-white rounded-3xl shadow-2xl p-6 md:p-8 border-4 border-pink-200 relative overflow-hidden">
            
            <div className="flex items-center justify-between mb-6 md:mb-8">
              <button 
                onClick={() => setCurrentView('home')}
                className="text-gray-400 hover:text-gray-700 transition"
              >
                <ArrowLeft size={28} />
              </button>
              <div className="flex items-center gap-2 bg-yellow-100 text-yellow-600 px-4 py-2 rounded-full font-bold text-lg border border-yellow-300 shadow-sm">
                <Star size={24} className="fill-yellow-500 text-yellow-500" />
                {score} pts
              </div>
            </div>

            {currentQuestion && (
              <div className="flex flex-col items-center">
                <p className="text-gray-500 font-bold mb-4 text-lg text-center">Which character makes this sound?</p>
                
                <button 
                  onClick={() => playSound(currentQuestion.kana)}
                  className="w-20 h-20 md:w-24 md:h-24 bg-blue-100 hover:bg-blue-200 text-blue-500 rounded-full flex items-center justify-center shadow-inner mb-6 md:mb-8 transition active:scale-90"
                >
                  <Volume2 size={40} className="md:w-12 md:h-12" />
                </button>

                <div className="grid grid-cols-2 gap-3 md:gap-4 w-full">
                  {options.map((option, index) => {
                    let buttonStyle = "bg-gray-50 border-2 border-gray-200 hover:border-pink-300 hover:bg-pink-50 text-gray-800";
                    if (feedback === 'correct' && option.kana === currentQuestion.kana) {
                      buttonStyle = "bg-green-100 border-2 border-green-500 text-green-700 animate-pulse";
                    } else if (feedback === 'incorrect' && option.kana === currentQuestion.kana) {
                       buttonStyle = "bg-green-50 border-2 border-green-300 text-green-700";
                    } else if (feedback !== null) {
                      buttonStyle = "bg-gray-100 border-2 border-gray-200 text-gray-400 opacity-50";
                    }

                    return (
                      <button
                        key={index}
                        onClick={() => handleAnswer(option)}
                        disabled={feedback !== null}
                        className={`h-24 md:h-32 rounded-2xl text-4xl md:text-5xl font-bold flex items-center justify-center shadow-sm transition transform active:scale-95 kyokasho-font ${buttonStyle}`}
                      >
                        {option.kana}
                      </button>
                    );
                  })}
                </div>

                {feedback === 'correct' && (
                  <div className="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 text-green-500 animate-in zoom-in spin-in-12 duration-300 pointer-events-none">
                    <Check size={160} strokeWidth={4} className="drop-shadow-lg" />
                  </div>
                )}
                {feedback === 'incorrect' && (
                  <div className="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 text-red-500 animate-in zoom-in duration-300 pointer-events-none">
                    <X size={160} strokeWidth={4} className="drop-shadow-lg" />
                  </div>
                )}
              </div>
            )}
          </div>
        </div>
      );

      // --- コンポーネント: 修了証画面 ---
      const renderCertificateView = () => (
        <div className="flex flex-col items-center justify-center p-4 animate-in zoom-in duration-500 w-full">
          <div className="bg-white p-8 md:p-12 rounded-3xl shadow-2xl border-8 border-pink-200 text-center max-w-2xl w-full relative overflow-hidden">
            
            <div className="absolute top-0 left-0 w-full h-full bg-pink-50 opacity-50 pointer-events-none"></div>

            <div className="relative z-10 flex flex-col items-center">
              <Award size={80} className="text-pink-500 mb-6 drop-shadow-md" />
              <h2 className="text-3xl md:text-5xl font-extrabold text-pink-600 mb-4 uppercase tracking-widest">
                Certificate
              </h2>
              <p className="text-gray-600 text-lg md:text-xl mb-6">This certifies that</p>
              <h3 className="text-4xl md:text-6xl font-bold text-blue-600 mb-6 border-b-4 border-blue-200 pb-2 px-8">
                {userName}
              </h3>
              <p className="text-gray-700 text-lg md:text-xl mb-2">has successfully mastered the</p>
              <p className="text-gray-700 text-xl md:text-2xl font-bold mb-8">Hiragana Quiz</p>
              
              <div className="flex flex-col md:flex-row gap-4">
                <button 
                  onClick={downloadCertificate}
                  className="flex items-center justify-center gap-2 bg-pink-500 hover:bg-pink-600 text-white text-lg font-bold py-3 px-6 rounded-full shadow-lg transform transition active:scale-95"
                >
                  <Download size={24} />
                  Download
                </button>
                <button 
                  onClick={() => {
                    setScore(0);
                    setCurrentView('home');
                  }}
                  className="flex items-center justify-center gap-2 bg-gray-200 hover:bg-gray-300 text-gray-700 text-lg font-bold py-3 px-6 rounded-full shadow transition active:scale-95"
                >
                  <Home size={24} />
                  Home
                </button>
              </div>
            </div>
          </div>
        </div>
      );

      return (
        <div className="min-h-screen bg-gradient-to-br from-blue-100 via-purple-100 to-pink-100 font-sans p-4 md:p-8 flex flex-col">
          <style>
            {`
              @import url('https://fonts.googleapis.com/css2?family=Klee+One:wght@600&display=swap');
              .kyokasho-font {
                font-family: 'Klee One', 'UD Digi Kyokasho N-B', 'UD デジタル 教科書体 N-B', 'Yu Mincho', serif;
              }
            `}
          </style>
          <div className="max-w-4xl mx-auto w-full flex-1 flex flex-col justify-center">
            {currentView === 'home' && renderHomeView()}
            {currentView === 'table' && renderTableView()}
            {currentView === 'quiz' && renderQuizView()}
            {currentView === 'certificate' && renderCertificateView()}
          </div>
        </div>
      );
    }

    // アプリを画面に表示する処理
    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
